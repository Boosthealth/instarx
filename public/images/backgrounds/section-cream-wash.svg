<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Soft cream section background">
  <defs>
    <linearGradient id="cream" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0" stop-color="#fdfaf5"/>
      <stop offset="1" stop-color="#f4ece1"/>
    </linearGradient>
    <radialGradient id="warmL" cx="0.0" cy="0.5" r="0.7">
      <stop offset="0" stop-color="#f7e8d6" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#f7e8d6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coolR" cx="1.0" cy="0.15" r="0.6">
      <stop offset="0" stop-color="#eef5f6" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#eef5f6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#cream)"/>
  <rect width="1600" height="900" fill="url(#warmL)"/>
  <rect width="1600" height="900" fill="url(#coolR)"/>
</svg>
