<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Warm golden-hour gradient background">
  <defs>
    <!-- base warm wash, cream to soft peach -->
    <linearGradient id="base" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#fbf6ee"/>
      <stop offset="0.55" stop-color="#f6e9d9"/>
      <stop offset="1" stop-color="#efd9c3"/>
    </linearGradient>
    <!-- sun flare, top-right warm glow -->
    <radialGradient id="sun" cx="0.82" cy="0.22" r="0.62">
      <stop offset="0" stop-color="#fff6e2" stop-opacity="0.95"/>
      <stop offset="0.35" stop-color="#f7dca6" stop-opacity="0.7"/>
      <stop offset="0.7" stop-color="#e9b98a" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#e9b98a" stop-opacity="0"/>
    </radialGradient>
    <!-- cool airy lift, top-left (sky) -->
    <radialGradient id="sky" cx="0.12" cy="0.1" r="0.55">
      <stop offset="0" stop-color="#eef6fa" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#eef6fa" stop-opacity="0"/>
    </radialGradient>
    <!-- soft warm anchor, lower portion -->
    <radialGradient id="anchor" cx="0.4" cy="1.05" r="0.7">
      <stop offset="0" stop-color="#d9a87f" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#d9a87f" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#base)"/>
  <rect width="1600" height="900" fill="url(#anchor)"/>
  <rect width="1600" height="900" fill="url(#sky)"/>
  <rect width="1600" height="900" fill="url(#sun)"/>
</svg>
