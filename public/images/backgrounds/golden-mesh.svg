<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Golden-hour mesh gradient background">
  <defs>
    <linearGradient id="mbase" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbf3e8"/>
      <stop offset="1" stop-color="#f0dcc4"/>
    </linearGradient>
    <radialGradient id="blob1" cx="0.2" cy="0.25" r="0.5">
      <stop offset="0" stop-color="#ffeecb" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ffeecb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="0.85" cy="0.35" r="0.55">
      <stop offset="0" stop-color="#f3c79a" stop-opacity="0.7"/>
